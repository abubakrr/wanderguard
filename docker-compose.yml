services:

  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-wanderguard}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-wanderguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/scripts/entrypoint.sh"]
    command: gunicorn wanderguard.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file: .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: 204.168.137.203' http://localhost:8000/api/docs/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery:
    build: .
    restart: unless-stopped
    command: celery -A wanderguard worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy

  # One-shot container to issue / renew TLS certs via Let's Encrypt
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      certbot certonly --webroot -w /var/www/certbot
      --email ${CERTBOT_EMAIL}
      -d ${DOMAIN}
      --agree-tos --no-eff-email
    profiles:
      - certbot   # run with: docker compose --profile certbot up certbot

volumes:
  postgres_data:
  static_volume:
  media_volume:
  certbot_www:
  certbot_conf:
