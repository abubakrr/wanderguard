# ── STEP 1 bootstrap: HTTP-only (used before TLS cert exists) ─────────────────
# After you have a cert, replace this file with nginx.https.conf contents
# and run: docker compose restart nginx

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (needed even in HTTP-only mode)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
